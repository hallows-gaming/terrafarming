<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TerraFarming</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone-shell">
      <div class="app">
        <section id="titleScreen" class="title-screen" aria-label="タイトル画面" role="button" tabindex="0">
          <div class="title-planet" aria-hidden="true">
            <div class="planet-core"></div>
            <div class="sprout sprout-a"></div>
            <div class="sprout sprout-b"></div>
            <div class="sprout sprout-c"></div>
          </div>
          <div class="title-copy">
            <span>Asteroid farm</span>
            <h1>TerraFarming</h1>
            <p>Tap to start</p>
          </div>
        </section>

        <header class="hud-top">
          <div class="hud-actions">
            <button id="resetBtn" class="icon-button" title="セーブを初期化" aria-label="セーブを初期化">↺</button>
          </div>

          <section class="asteroid" aria-label="小惑星ステータス">
            <div class="planet" aria-hidden="true">
              <div class="planet-core"></div>
              <div class="sprout sprout-a"></div>
              <div class="sprout sprout-b"></div>
              <div class="sprout sprout-c"></div>
            </div>
            <div class="stage-card">
              <span>開拓段階</span>
              <strong id="terraStage">荒野</strong>
              <div class="green-meter" aria-label="緑化率">
                <span id="greenBar"></span>
              </div>
              <small>緑化率 <b id="greenRate">0%</b></small>
            </div>
          </section>

          <section class="hud-grid" aria-label="資源と環境">
            <div class="hud-pill"><span>🍞</span><small>食料</small><strong id="food">0</strong></div>
            <div class="hud-pill"><span>ⓒ</span><small>コイン</small><strong id="coins">0</strong></div>
            <div class="hud-pill"><span>TP</span><small>テラP</small><strong id="terraPoints">0</strong></div>
            <div class="hud-pill env"><span>O2</span><small>酸素</small><strong id="oxygen">0</strong></div>
            <div class="hud-pill env"><span>💧</span><small>水分</small><strong id="water">0</strong></div>
            <div class="hud-pill env"><span>N</span><small>窒素</small><strong id="nitrogen">0</strong></div>
          </section>
        </header>

        <div class="screen-stack">
          <section id="fieldPanel" class="panel field-panel active" aria-label="畑">
            <div class="field-status">
              <div>
                <span>選択中の種</span>
                <strong id="selectedSeedLabel">スターキャロット</strong>
              </div>
              <button id="plantAllBtn" class="mini-action">まとめて植える</button>
            </div>
            <div id="fieldGrid" class="field-grid"></div>
            <button id="harvestAllBtn" class="primary wide">収穫できる作物を集める</button>
          </section>

          <section id="seedPanel" class="panel management-panel" aria-label="種">
            <div class="section-head">
              <h2>種トレイ</h2>
              <span>栽培候補</span>
            </div>
            <div id="seedPicker" class="seed-picker"></div>
          </section>

          <section id="storagePanel" class="panel management-panel" aria-label="倉庫">
            <div class="section-head">
              <h2>収穫した野菜</h2>
              <span id="storageCount">0個</span>
            </div>
            <button id="sellAllBtn" class="secondary wide">すべて売る</button>
            <div id="storageList" class="list empty"></div>
          </section>

          <section id="missionsPanel" class="panel management-panel" aria-label="開拓">
            <div class="section-head">
              <h2>開拓ミッション</h2>
              <span id="missionProgress">0/0</span>
            </div>
            <div id="missionList" class="mission-list"></div>
            <div class="section-head unlock-head">
              <h2>宇宙農協だより</h2>
              <span id="coopSummary">お願い</span>
            </div>
            <div id="coopRequestList" class="request-list"></div>
            <div class="section-head unlock-head">
              <h2>設備アップグレード</h2>
              <span id="bonusSummary">ボーナス</span>
            </div>
            <div id="upgradeList" class="upgrade-list"></div>
            <div class="section-head unlock-head">
              <h2>環境メモ</h2>
              <span id="unlockSummary">次の目標</span>
            </div>
            <div id="unlockList" class="unlock-list"></div>
          </section>

          <section id="labPanel" class="panel management-panel" aria-label="交配ラボ">
            <div class="section-head">
              <h2>次世代の種を作る</h2>
              <span id="seedName">スターキャロット</span>
            </div>
            <div class="lab-slots">
              <button id="parentA" class="parent-slot">親Aを選択</button>
              <button id="parentB" class="parent-slot">親Bを選択</button>
            </div>
            <button id="breedBtn" class="primary wide" disabled>交配する</button>
            <div id="labResult" class="lab-result"></div>
          </section>
        </div>

        <section id="deliveryModal" class="delivery-modal" aria-label="届ける作物を選ぶ" aria-hidden="true">
          <div class="delivery-sheet">
            <div class="section-head">
              <h2 id="deliveryTitle">届ける作物</h2>
              <button id="deliveryCloseBtn" class="icon-button" type="button" aria-label="閉じる">×</button>
            </div>
            <p id="deliveryNote" class="delivery-note"></p>
            <div id="deliveryCropList" class="delivery-crop-list"></div>
          </div>
        </section>

        <footer class="toast" aria-live="polite">
          <span id="logText">小惑星の朝です。まずは種を植えましょう。</span>
        </footer>

        <nav class="tabs" aria-label="表示切替">
          <button class="tab active" data-tab="field"><span>🌱</span>畑</button>
          <button class="tab" data-tab="seed"><span>🌰</span>種</button>
          <button class="tab" data-tab="storage"><span>📦</span>倉庫</button>
          <button class="tab" data-tab="missions"><span>🛰</span>開拓</button>
          <button class="tab" data-tab="lab"><span>🧪</span>ラボ</button>
        </nav>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
